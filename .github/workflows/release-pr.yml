name: Release PR

on:
  milestone:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-release-pr:
    name: Open Release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate milestone title is semver
        run: |
          if ! [[ "${{ github.event.milestone.title }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Milestone title '${{ github.event.milestone.title }}' is not a valid semver version (e.g. 1.2.3). Skipping."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24.13.1"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json
        run: npm version ${{ github.event.milestone.title }} --no-git-tag-version

      - name: Create release branch and push
        run: |
          git checkout -b release/${{ github.event.milestone.title }}
          git add package.json package-lock.json
          git commit -m "Release ${{ github.event.milestone.title }}"
          git push origin release/${{ github.event.milestone.title }}

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "type: release" \
            --color "0075ca" \
            --description "Automated release PR" \
            --force
          gh label create "priority: high" \
            --color "d93f0b" \
            --description "High priority" \
            --force

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.milestone.title }}"
          MILESTONE_URL="${{ github.event.milestone.html_url }}"

          ISSUES=$(gh api \
            "repos/${{ github.repository }}/issues?milestone=${{ github.event.milestone.number }}&state=closed&per_page=100" \
            --jq '.[] | select(.pull_request == null) | "- \(.title) [#\(.number)](\(.html_url))"' \
            | head -50)

          {
            echo "## Release $VERSION"
            echo ""
            echo "### Changes"
            echo ""
            echo "$ISSUES"
            echo ""
            echo "---"
            echo "Milestone: [$VERSION]($MILESTONE_URL)"
            echo ""
            echo "> Merge this PR to publish tag \`v$VERSION\` and create the GitHub Release."
          } > /tmp/pr-body.md

          PR_URL=$(gh pr create \
            --title "Release $VERSION" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "release/$VERSION" \
            --label "type: release" \
            --label "priority: high")

          gh pr edit "$PR_URL" --milestone "$VERSION"
