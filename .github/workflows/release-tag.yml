name: Release Tag

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  create-release:
    name: Create Tag and Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'type: release')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from PR title
        id: version
        run: |
          VERSION="${{ github.event.pull_request.title }}"
          VERSION="${VERSION#Release }"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Could not extract a valid semver from PR title '${VERSION}'. Skipping."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest

      - name: Delete release branch
        run: |
          git push origin --delete "release/${{ steps.version.outputs.version }}" || true
